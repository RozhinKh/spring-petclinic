# Load Test Execution Harness Configuration
# Multi-variant load testing configuration for PetClinic benchmark suite

# ============================================
# Variant Definitions
# ============================================

# Java 17 Baseline Variant
variant.java17.name=java17-baseline
variant.java17.description=Java 17 Baseline
variant.java17.profile=default
variant.java17.port=8080
variant.java17.jvm.options=-Xms512m -Xmx2g

# Java 21 Traditional Variant (Platform Threads)
variant.java21-traditional.name=java21-traditional
variant.java21-traditional.description=Java 21 Traditional
variant.java21-traditional.profile=default
variant.java21-traditional.port=8081
variant.java21-traditional.jvm.options=-Xms512m -Xmx2g

# Java 21 Virtual Threads Variant
variant.java21-virtual.name=java21-virtual
variant.java21-virtual.description=Java 21 Virtual Threads
variant.java21-virtual.profile=vthreads
variant.java21-virtual.port=8082
variant.java21-virtual.jvm.options=-Xms512m -Xmx2g

# ============================================
# Database Configuration
# ============================================

# Database type: h2, mysql, or postgres
database.type=h2

# H2 Database (In-Memory)
database.h2.driver=org.h2.Driver
database.h2.url=jdbc:h2:mem:petclinic;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
database.h2.username=sa
database.h2.password=

# MySQL Configuration
database.mysql.driver=com.mysql.cj.jdbc.Driver
database.mysql.url=jdbc:mysql://localhost:3306/petclinic
database.mysql.username=root
database.mysql.password=root
database.mysql.reset_script=src/main/resources/db/mysql/reset.sql

# PostgreSQL Configuration
database.postgres.driver=org.postgresql.Driver
database.postgres.url=jdbc:postgresql://localhost:5432/petclinic
database.postgres.username=postgres
database.postgres.password=postgres
database.postgres.reset_script=src/main/resources/db/postgres/reset.sql

# ============================================
# Load Test Configuration
# ============================================

# JMeter Test Plan Location
jmeter.test_plan=src/test/jmeter/petclinic_test_plan.jmx

# Test Profiles (concurrent users, ramp-up time in seconds, steady-state duration in seconds)
test.profile.light.threads=100
test.profile.light.rampup=300
test.profile.light.duration=600

test.profile.medium.threads=250
test.profile.medium.rampup=300
test.profile.medium.duration=600

test.profile.peak.threads=500
test.profile.peak.rampup=300
test.profile.peak.duration=600

# ============================================
# Application Startup Configuration
# ============================================

# Application health check URL (relative to application base URL)
application.health_url=/actuator/health
application.health_timeout_seconds=30
application.startup_timeout_seconds=60

# Warm-up period after application starts (in seconds)
# Allows for JIT compilation, cache population
application.warmup_seconds=30
application.warmup_requests=50

# ============================================
# Build Configuration
# ============================================

# Maven command to build variant
maven.clean=true
maven.profiles=true
maven.build_timeout_minutes=10

# ============================================
# Results Configuration
# ============================================

# Results output directory
results.directory=target/load-test-results
results.create_timestamp_subdirs=true
results.export_format=json

# Data consistency check
data.min_owners=100
data.min_pets=200

# ============================================
# Execution Configuration
# ============================================

# Run all variants or specific variants only
variants.to_run=java17-baseline,java21-traditional,java21-virtual

# Run parallel or sequential
execution.parallel=false

# Clean up application processes after test
execution.cleanup_on_error=true
execution.cleanup_on_exit=true

# ============================================
# Logging Configuration
# ============================================

# Log level: DEBUG, INFO, WARN, ERROR
logging.level=INFO
logging.file=target/load-test-harness.log
