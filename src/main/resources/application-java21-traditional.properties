# Java 21 Traditional Platform Threads Configuration
# This profile provides a control variant for Java 21 that isolates pure language feature improvements
# (records, pattern matching, switch expressions) while maintaining traditional platform thread model.
# This is NOT a virtual thread variant - it explicitly uses platform threads for comparison testing.

# Tomcat - Traditional Platform Threads (no virtual threads)
# Virtual threads are disabled by default; we explicitly keep platform threads
# Note: server.tomcat.virtual-threads.enabled is not set, defaults to false

# Thread pool configuration with traditional platform threads
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# Connection pooling configuration with traditional platform threads
# HikariCP pool sizing for platform threads (more conservative than virtual threads)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate batch settings for platform threads
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Cache configuration
spring.cache.type=caffeine

# Actuator endpoints for monitoring
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Logging
logging.level.org.springframework=INFO
logging.level.org.apache.catalina=INFO

# Platform thread specific settings
# These settings ensure we're using traditional Java threading model
spring.mvc.async.request-timeout=30000
