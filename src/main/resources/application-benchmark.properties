# Spring Boot Actuator Configuration for Benchmark Metrics Collection
# This profile enables comprehensive metrics monitoring during benchmark execution

# Enable all Actuator endpoints and expose them over HTTP
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true

# Enable detailed HTTP metrics
management.metrics.enable.http.server.requests=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.75,0.95,0.99,0.999

# Enable detailed JVM metrics
management.metrics.enable.jvm.memory.used=true
management.metrics.enable.jvm.memory.max=true
management.metrics.enable.jvm.threads.peak=true
management.metrics.enable.jvm.threads.live=true
management.metrics.enable.jvm.threads.daemon=true
management.metrics.enable.jvm.gc.pause=true
management.metrics.enable.jvm.gc.max.data.size=true

# Thread pool metrics (for both platform and virtual threads)
management.metrics.enable.executor.active=true
management.metrics.enable.executor.queued=true
management.metrics.enable.executor.pool.size=true
management.metrics.enable.executor.pool.core=true
management.metrics.enable.executor.pool.max=true

# Cache metrics (Caffeine backend)
management.metrics.enable.cache.gets=true
management.metrics.enable.cache.puts=true
management.metrics.enable.cache.evictions=true
management.metrics.enable.cache.removals=true

# Database connection pool metrics (HikariCP)
management.metrics.enable.hikaricp.connections=true
management.metrics.enable.hikaricp.connections.active=true
management.metrics.enable.hikaricp.connections.idle=true
management.metrics.enable.hikaricp.connections.max=true
management.metrics.enable.hikaricp.connections.pending=true

# Enable Tomcat metrics for request/response tracking
management.metrics.enable.tomcat.sessions.active=true
management.metrics.enable.tomcat.threads.current=true
management.metrics.enable.tomcat.threads.max=true
management.metrics.enable.tomcat.threads.busy=true

# Process and system metrics
management.metrics.enable.process.cpu.usage=true
management.metrics.enable.system.cpu.usage=true
management.metrics.enable.system.memory.usage=true

# Customize metrics endpoints
management.endpoints.web.base-path=/actuator
management.endpoints.web.path-mapping.metrics=metrics

# Allow detailed endpoint exposure
management.endpoints.web.exposure.exclude=

# Actuator endpoint configuration for metrics
management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=GET

# Compression settings for large metric responses
server.compression.enabled=true
server.compression.min-response-size=1024

# Logging for Actuator
logging.level.org.springframework.boot.actuate=DEBUG

# Reduce verbose web and SQL logging during benchmarks
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=DEBUG
logging.level.org.springframework.boot.web.servlet.error=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Include error details in benchmark responses to diagnose 5xx under load
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
