# Virtual Threads Configuration for Java 21+
# This profile enables Tomcat virtual threads (Project Loom)
# Virtual threads are lightweight threads that significantly reduce the overhead
# of creating and managing threads, allowing higher concurrency with fewer resources.

# Tomcat virtual threads settings
server.tomcat.virtual-threads.enabled=true

# Maximum number of worker threads
# With virtual threads, this can be set much higher than traditional threads
# since each virtual thread is extremely lightweight
server.tomcat.threads.max=10000

# Minimum spare threads
server.tomcat.threads.min-spare=10

# Connection pooling can be more aggressive with virtual threads
# Virtual threads have minimal memory footprint (~1KB vs ~1MB for platform threads)
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA/Hibernate batch settings for better performance
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Cache configuration
spring.cache.type=caffeine

# Actuator endpoints for monitoring virtual threads
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Logging
logging.level.org.springframework=INFO
logging.level.org.apache.catalina=INFO
