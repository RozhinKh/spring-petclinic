# Java 21 Virtual Threads Configuration (I/O-Bound Variant)
# This profile optimizes Java 21 for virtual threads, enabling lightweight concurrency
# for I/O-bound operations (database queries, HTTP requests, file I/O, etc).
# Virtual threads are managed by the OS scheduler and provide better resource utilization
# than traditional platform threads for high-concurrency scenarios.

# Tomcat - Virtual Threads Enabled
# Spring Boot 4.0+ supports virtual threads out of the box via Tomcat
# This configuration enables virtual thread support for handling HTTP requests
server.tomcat.virtual-threads.enabled=true

# Thread pool configuration with virtual threads
# Virtual threads are lightweight, so we can use higher limits
# For a single-threaded application, we still need reasonable bounds
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=10

# Connection pooling configuration with virtual thread support
# HikariCP fully supports virtual threads as of version 5.0+
# With virtual threads, we can use more aggressive connection pool sizing
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# Enable HikariCP's virtual thread aware connection waiting
# This optimizes thread waiting for connection availability
spring.datasource.hikari.thread-factory=virtual

# JPA/Hibernate batch settings optimized for virtual threads
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.jdbc.fetch_size=100

# Hibernate query hint for virtual thread optimization
# Enables query batching which improves throughput with virtual threads
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Cache configuration
spring.cache.type=caffeine

# Actuator endpoints for monitoring virtual thread usage
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Add metrics for thread and task execution
management.metrics.enable.tomcat=true
management.metrics.enable.jvm.threads=true

# Logging
logging.level.org.springframework=INFO
logging.level.org.apache.catalina=INFO
logging.level.org.hibernate=WARN

# Virtual thread specific settings
# Disable traditional async request timeout and use virtual thread defaults
# Virtual threads naturally handle blocking without exhaustion
spring.mvc.async.request-timeout=-1

# Enable virtual thread support in async operations
# This is picked up by Spring's async infrastructure
spring.threads.virtual.enabled=true

# Task execution configuration for virtual threads
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=500

# Task scheduling configuration for virtual threads
spring.task.scheduling.pool.size=5

# Note: @Async methods will use the virtualThreadExecutor bean
# configured in VirtualThreadExecutorConfig when available
